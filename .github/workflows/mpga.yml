# MPGA Evidence Check — GitHub Actions workflow
# Enforces evidence health on pull requests.

name: MPGA Evidence Check

on:
  pull_request:
    paths:
      - 'src/**'
      - 'mpga-plugin/**'

jobs:
  evidence:
    name: Evidence health check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MPGA CLI
        run: pip install -e .
        working-directory: mpga-plugin/cli

      - name: Verify evidence links
        run: mpga evidence verify

      - name: Check drift threshold (80%)
        run: mpga drift --ci --threshold 80

      - name: Check evidence coverage (20% minimum)
        run: mpga evidence coverage --min 20

      - name: Show health report
        if: always()
        run: mpga health --verbose
