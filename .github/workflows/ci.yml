name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build, Test & Lint
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: mpga-plugin/cli/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: mpga-plugin/cli

      - name: Type check
        run: npm run typecheck
        working-directory: mpga-plugin/cli

      - name: Lint
        run: npm run lint
        working-directory: mpga-plugin/cli

      - name: Format check
        run: npm run format:check
        working-directory: mpga-plugin/cli

      - name: Test
        run: npm test
        working-directory: mpga-plugin/cli

      - name: Build
        run: npm run build
        working-directory: mpga-plugin/cli

      - name: Verify CLI runs
        run: node bin/mpga.js --version
        working-directory: mpga-plugin/cli
