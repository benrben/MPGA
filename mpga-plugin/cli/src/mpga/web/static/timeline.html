<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Timeline — MPGA</title>
  <link rel="stylesheet" href="tokens.css">
  <style>
    body {
      margin: 0;
      font-family: var(--font-sans);
      background: var(--color-bg);
      color: var(--color-ink);
    }

    .timeline-header {
      padding: var(--space-lg) var(--space-xl);
      border-bottom: 1px solid var(--color-border);
      background: var(--color-panel);
    }

    .timeline-header h1 { margin: 0; font-size: var(--text-xl); }

    .timeline-container {
      max-width: 760px;
      margin: var(--space-xl) auto;
      padding: 0 var(--space-md);
    }

    .timeline {
      position: relative;
      padding-left: 28px;
    }

    .timeline::before {
      content: "";
      position: absolute;
      left: 8px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--color-border);
    }

    .timeline-date {
      font-size: var(--text-sm);
      font-weight: 700;
      color: var(--color-accent);
      margin: var(--space-lg) 0 var(--space-sm);
      position: relative;
    }

    .timeline-date::before {
      content: "";
      position: absolute;
      left: -24px;
      top: 50%;
      transform: translateY(-50%);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--color-accent);
    }

    .timeline-entry {
      position: relative;
      background: var(--color-panel);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-md) var(--space-lg);
      margin-bottom: var(--space-md);
    }

    .timeline-entry::before {
      content: "";
      position: absolute;
      left: -22px;
      top: 18px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-muted);
      border: 2px solid var(--color-bg);
    }

    .entry-title {
      font-size: var(--text-base);
      font-weight: 600;
      margin: 0 0 var(--space-xs);
    }

    .entry-type {
      display: inline-block;
      font-size: var(--text-xs);
      font-weight: 600;
      padding: 1px 6px;
      border-radius: var(--radius-sm);
      background: var(--color-border);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .entry-time {
      font-size: var(--text-xs);
      color: var(--color-muted);
      margin-left: var(--space-sm);
    }

    .entry-content {
      margin-top: var(--space-sm);
      font-size: var(--text-sm);
      line-height: 1.5;
      color: var(--color-muted);
    }

    .loading-state {
      text-align: center;
      padding: var(--space-2xl);
      color: var(--color-muted);
    }
  </style>
</head>
<body>
  <header class="timeline-header">
    <h1>Observation Timeline</h1>
  </header>

  <div class="timeline-container">
    <div class="timeline" id="timeline">
      <div class="loading-state" id="loading">Loading timeline…</div>
    </div>
  </div>

  <template id="date-template">
    <div class="timeline-date"></div>
  </template>

  <template id="entry-template">
    <article class="timeline-entry">
      <h3 class="entry-title"></h3>
      <span class="entry-type"></span>
      <span class="entry-time"></span>
      <p class="entry-content"></p>
    </article>
  </template>

  <script>
    (function () {
      const timeline = document.getElementById("timeline");
      const loading = document.getElementById("loading");
      const dateTemplate = document.getElementById("date-template");
      const entryTemplate = document.getElementById("entry-template");

      function renderEntry(obs) {
        const clone = entryTemplate.content.cloneNode(true);
        clone.querySelector(".entry-title").textContent = obs.title || "Untitled";
        clone.querySelector(".entry-type").textContent = obs.obs_type || "";
        clone.querySelector(".entry-time").textContent = obs.created_at || "";
        clone.querySelector(".entry-content").textContent = obs.content || "";
        return clone;
      }

      function renderDate(dateStr) {
        const clone = dateTemplate.content.cloneNode(true);
        clone.querySelector(".timeline-date").textContent = dateStr;
        return clone;
      }

      function groupByDate(observations) {
        const groups = {};
        for (const obs of observations) {
          const date = (obs.created_at || "").split("T")[0] || "Unknown";
          if (!groups[date]) groups[date] = [];
          groups[date].push(obs);
        }
        return groups;
      }

      async function load() {
        try {
          const resp = await fetch("/api/observations/timeline");
          if (!resp.ok) throw new Error(resp.statusText);
          const data = await resp.json();
          const observations = data.observations || data;

          loading.remove();

          const groups = groupByDate(observations);
          const sortedDates = Object.keys(groups).sort().reverse();

          for (const date of sortedDates) {
            timeline.appendChild(renderDate(date));
            for (const obs of groups[date]) {
              timeline.appendChild(renderEntry(obs));
            }
          }
        } catch (err) {
          loading.textContent = "Failed to load timeline.";
        }
      }

      load();
    })();
  </script>
</body>
</html>
