<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Observation Feed — MPGA</title>
  <link rel="stylesheet" href="tokens.css">
  <style>
    body {
      margin: 0;
      font-family: var(--font-sans);
      background: var(--color-bg);
      color: var(--color-ink);
    }

    .feed-header {
      padding: var(--space-lg) var(--space-xl);
      border-bottom: 1px solid var(--color-border);
      background: var(--color-panel);
    }

    .feed-header h1 {
      margin: 0;
      font-size: var(--text-xl);
    }

    .feed-status {
      font-size: var(--text-sm);
      color: var(--color-muted);
      margin-top: var(--space-xs);
    }

    .feed-container {
      max-width: 720px;
      margin: var(--space-xl) auto;
      padding: 0 var(--space-md);
    }

    .observation-card {
      background: var(--color-panel);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-lg);
      margin-bottom: var(--space-md);
      box-shadow: var(--color-shadow);
      transition: transform 0.15s ease;
    }

    .observation-card:hover {
      transform: translateY(-2px);
    }

    .observation-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-sm);
    }

    .observation-title {
      font-size: var(--text-lg);
      font-weight: 600;
      margin: 0;
    }

    .observation-time {
      font-size: var(--text-xs);
      color: var(--color-muted);
      white-space: nowrap;
    }

    .observation-body {
      font-size: var(--text-base);
      color: var(--color-ink);
      line-height: 1.5;
    }

    .type-badge {
      display: inline-block;
      font-size: var(--text-xs);
      font-weight: 600;
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .type-badge[data-type="pattern"] {
      background: #e0f2fe;
      color: #0369a1;
    }

    .type-badge[data-type="decision"] {
      background: #fef3c7;
      color: #92400e;
    }

    .type-badge[data-type="issue"] {
      background: #fee2e2;
      color: #991b1b;
    }

    .empty-state {
      text-align: center;
      padding: var(--space-2xl);
      color: var(--color-muted);
    }
  </style>
</head>
<body>
  <header class="feed-header">
    <h1>Observation Feed</h1>
    <div class="feed-status" id="feed-status">Connecting…</div>
  </header>

  <main class="feed-container" id="feed-container">
    <div class="empty-state" id="empty-state">Waiting for observations…</div>
  </main>

  <template id="card-template">
    <article class="observation-card">
      <div class="observation-card-header">
        <h2 class="observation-title"></h2>
        <time class="observation-time"></time>
      </div>
      <span class="type-badge"></span>
      <div class="observation-body"></div>
    </article>
  </template>

  <script>
    (function () {
      const container = document.getElementById("feed-container");
      const emptyState = document.getElementById("empty-state");
      const statusEl = document.getElementById("feed-status");
      const template = document.getElementById("card-template");

      function renderCard(obs) {
        const clone = template.content.cloneNode(true);
        clone.querySelector(".observation-title").textContent = obs.title || "Untitled";
        clone.querySelector(".observation-time").textContent = obs.created_at || "";
        const badge = clone.querySelector(".type-badge");
        badge.textContent = obs.obs_type || "unknown";
        badge.setAttribute("data-type", obs.obs_type || "unknown");
        clone.querySelector(".observation-body").textContent = obs.content || "";
        return clone;
      }

      function connect() {
        const source = new EventSource("/api/stream");

        source.onopen = function () {
          statusEl.textContent = "Connected — live";
        };

        source.addEventListener("observation-created", function (e) {
          const obs = JSON.parse(e.data);
          if (emptyState) emptyState.remove();
          container.prepend(renderCard(obs));
        });

        source.onerror = function () {
          statusEl.textContent = "Disconnected — retrying…";
        };
      }

      connect();
    })();
  </script>
</body>
</html>
