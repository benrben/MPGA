repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: mpga-drift
        name: MPGA drift check
        entry: mpga drift --quick
        language: system
        pass_filenames: false
